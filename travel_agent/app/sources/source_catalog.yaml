flights:
  - name: amadeus
    source_type: official_api
    connector: AmadeusFlightConnector
    status: enabled_when_configured
    required_env: [AMADEUS_CLIENT_ID, AMADEUS_CLIENT_SECRET]
  - name: skyscanner
    source_type: partner_api
    connector: SkyscannerFlightConnector
    status: requires_partner_access
    required_env: [SKYSCANNER_API_KEY]
  - name: naver_flight
    source_type: authorized_only
    connector: NaverFlightConnector
    status: disabled_until_authorized
    required_env: [NAVER_FLIGHT_AUTH_MODE]
  - name: google_flights
    source_type: public_page
    connector: GoogleFlightsPublicPageConnector
    status: enabled_by_default
    required_env: []
  - name: mock
    source_type: mock
    connector: MockFlightConnector
    status: dev_test_only
    required_env: []
accommodations:
  - name: expedia_rapid
    source_type: partner_api
    connector: ExpediaRapidAccommodationConnector
    status: requires_partner_access
    required_env: [EXPEDIA_RAPID_API_KEY, EXPEDIA_RAPID_SHARED_SECRET]
  - name: hotelbeds
    source_type: partner_api
    connector: HotelbedsAccommodationConnector
    status: enabled_when_configured
    required_env: [HOTELBEDS_API_KEY, HOTELBEDS_SECRET]
  - name: booking_demand
    source_type: partner_api
    connector: BookingDemandAccommodationConnector
    status: requires_affiliate_access
    required_env: [BOOKING_DEMAND_TOKEN]
  - name: agoda_partner
    source_type: partner_api
    connector: AgodaPartnerAccommodationConnector
    status: requires_partner_access
    required_env: [AGODA_PARTNER_API_KEY, AGODA_SITE_ID]
  - name: google_hotels_partner
    source_type: official_api
    connector: GoogleHotelsTravelPartnerConnector
    status: enabled_when_configured
    required_env: [GOOGLE_APPLICATION_CREDENTIALS, GOOGLE_HOTELS_PARTNER_ACCOUNT]
  - name: airbnb_public_page
    source_type: public_page
    connector: AirbnbPublicPageAccommodationConnector
    status: disabled_until_authorized
    required_env: [AIRBNB_AUTHORIZATION_MODE]
  - name: mock
    source_type: mock
    connector: MockAccommodationConnector
    status: dev_test_only
    required_env: []
